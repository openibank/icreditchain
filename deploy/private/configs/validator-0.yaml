# iCreditChain Private Validator 0 Configuration
base:
  role: "validator"
  data_dir: "/opt/icreditchain/data"
  waypoint:
    from_file: "/opt/icreditchain/genesis/waypoint.txt"

execution:
  genesis_file_location: "/opt/icreditchain/genesis/genesis.blob"
  concurrency_level: 4

consensus:
  safety_rules:
    service:
      type: "local"
    backend:
      type: "on_disk_storage"
      path: "/opt/icreditchain/data/safety-rules.db"
      namespace: "consensus_safety_rules"

validator_network:
  discovery_method: "onchain"
  listen_address: "/ip4/0.0.0.0/tcp/6180"
  mutual_authentication: true
  identity:
    type: "from_file"
    path: "/opt/icreditchain/genesis/validator-0/validator-identity.yaml"
  seed_addrs:
    # Other validators will be discovered via on-chain config
    # For bootstrapping, add seed addresses:
    # validator1_peer_id:
    #   - "/dns/validator1/tcp/6180/noise-ik/PUBKEY/handshake/0"

full_node_networks:
  # Validator Full Node (VFN) network — for trusted full nodes
  - network_id: "vfn"
    discovery_method: "onchain"
    listen_address: "/ip4/0.0.0.0/tcp/6181"
    identity:
      type: "from_file"
      path: "/opt/icreditchain/genesis/validator-0/validator-full-node-identity.yaml"
  # Public network — disabled for private deployment
  # Uncomment for consortium mode:
  # - network_id:
  #     private: "icreditchain-public"
  #   discovery_method: "onchain"
  #   listen_address: "/ip4/0.0.0.0/tcp/6182"
  #   max_inbound_connections: 100

api:
  enabled: true
  address: "0.0.0.0:8080"
  tls_cert_path: ~
  tls_key_path: ~

storage:
  dir: "/opt/icreditchain/data/db"
  storage_pruner_config:
    ledger_pruner_config:
      enable: true
      prune_window: 10000000
    state_merkle_pruner_config:
      enable: true
      prune_window: 100000
  rocksdb_configs:
    enable_storage: true

logger:
  level: "INFO"
  is_async: true
  channel_size: 10000
